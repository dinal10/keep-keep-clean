<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | Keep Clean</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <div class="page-shell admin-shell">
    <section class="admin-login-card" data-admin-login>
      <p class="eyebrow">Admin panel</p>
      <h1 class="admin-title">LOGIN</h1>
      <div class="admin-alert admin-alert-error hidden" data-login-error></div>
      <form class="admin-form" data-login-form>
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required>
        </div>
        <button class="button button-primary" type="submit">Masuk</button>
      </form>
    </section>

    <div class="hidden" data-admin-app>
      <header class="admin-topbar">
        <div>
          <p class="eyebrow">Admin control panel</p>
          <h1 class="admin-title">Update harga, media, branding, dan konten website langsung dari database.</h1>
        </div>
        <div class="button-row">
          <a class="button button-secondary" href="../index.html" target="_blank" rel="noreferrer">Lihat Website</a>
          <button class="button button-secondary" type="button" data-logout>Logout</button>
        </div>
      </header>

      <div class="admin-alert admin-alert-success hidden" data-admin-success></div>
      <div class="admin-alert admin-alert-error hidden" data-admin-error></div>

      <section class="admin-dashboard" data-admin-stats></section>

      <section class="admin-section">
        <div class="section-heading">
          <p class="eyebrow">Website settings</p>
          <h2>Konten utama</h2>
        </div>
        <form class="admin-form-grid" data-settings-form></form>
      </section>

      <section class="admin-section">
        <div class="section-heading">
          <p class="eyebrow">Pricing</p>
          <h2>Harga dan paket</h2>
        </div>
        <form class="admin-stack" data-pricing-form></form>
      </section>

      <section class="admin-section">
        <div class="section-heading">
          <p class="eyebrow">Gallery</p>
          <h2>CRUD galeri gambar</h2>
        </div>
        <div class="admin-stack" data-gallery-list></div>
        <form class="admin-card admin-form-grid" data-gallery-add-form>
          <div class="field">
            <label for="new_gallery_title">Judul gambar baru</label>
            <input id="new_gallery_title" name="title" type="text" required>
          </div>
          <div class="field">
            <label for="new_gallery_file">File gambar baru</label>
            <input id="new_gallery_file" name="file" type="file" accept=".jpg,.jpeg,.png,.webp,.svg" required>
          </div>
          <div class="button-row field-full">
            <button class="button button-primary" type="submit">Tambah Gambar</button>
          </div>
        </form>
      </section>

      <section class="admin-section">
        <div class="section-heading">
          <p class="eyebrow">Videos</p>
          <h2>CRUD video</h2>
        </div>
        <div class="admin-stack" data-video-list></div>
        <form class="admin-card admin-form-grid" data-video-add-form>
          <div class="field">
            <label for="new_video_title">Judul video baru</label>
            <input id="new_video_title" name="title" type="text" required>
          </div>
          <div class="field">
            <label for="new_video_file">File video baru</label>
            <input id="new_video_file" name="video" type="file" accept=".mp4,.webm,.mov" required>
          </div>
          <div class="field field-full">
            <label for="new_video_poster">Poster video baru</label>
            <input id="new_video_poster" name="poster" type="file" accept=".jpg,.jpeg,.png,.webp" required>
          </div>
          <div class="button-row field-full">
            <button class="button button-primary" type="submit">Tambah Video</button>
          </div>
        </form>
      </section>

      <section class="admin-section">
        <div class="section-heading">
          <p class="eyebrow">Branding</p>
          <h2>Logo dan identitas</h2>
        </div>
        <form class="admin-form-grid" data-branding-form>
          <div class="field">
            <label for="logo_text">Logo text</label>
            <input id="logo_text" name="logo_text" type="text" required>
          </div>
          <div class="field">
            <label for="logo_file">Upload logo baru</label>
            <input id="logo_file" name="logo_file" type="file" accept=".jpg,.jpeg,.png,.webp,.svg">
          </div>
          <div class="field field-full">
            <label>Logo aktif</label>
            <div class="admin-logo-preview">
              <img src="" alt="Logo aktif" data-brand-logo>
            </div>
          </div>
          <div class="button-row field-full">
            <button class="button button-primary" type="submit">Simpan Branding</button>
          </div>
        </form>
      </section>

      <section class="admin-section">
        <div class="section-heading">
          <p class="eyebrow">Security</p>
          <h2>Ganti password admin</h2>
        </div>
        <form class="admin-form-grid" data-password-form>
          <div class="field">
            <label for="current_password">Password lama</label>
            <input id="current_password" name="current_password" type="password" required>
          </div>
          <div class="field">
            <label for="new_password">Password baru</label>
            <input id="new_password" name="new_password" type="password" required>
          </div>
          <div class="field field-full">
            <label for="confirm_password">Konfirmasi password baru</label>
            <input id="confirm_password" name="confirm_password" type="password" required>
          </div>
          <div class="button-row field-full">
            <button class="button button-primary" type="submit">Ubah Password</button>
          </div>
        </form>
      </section>
    </div>
  </div>
  <script src="admin.js"></script>
</body>
</html>
